linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - misspell

linters-settings:
  errcheck:
    check-type-assertions: true

issues:
  exclude-use-default: false
  exclude-rules:
    # Scanner stubs intentionally return nil,nil pending real cloud SDK integration
    - path: internal/scanner/
      linters: [errcheck]
